apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linkedin-responder
  namespace: linkedin-responder
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - linkedin.172.19.76.103.sslip.io
      secretName: linkedin-responder-tls
  rules:
    - host: linkedin.172.19.76.103.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linkedin-responder
                port:
                  number: 80
